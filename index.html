<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ya Aayni</title>
<style>
body {
margin: 0;
padding: 0;
background: linear-gradient(to right, #ff9a9e, #fad0c4);
font-family: 'Segoe UI', sans-serif;
text-align: center;
overflow-x: hidden;
min-height: 100vh;
}

body::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url('background.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
opacity: 1;
z-index: -1;
}

.container {
position: relative;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 2;
background: rgba(0, 0, 0, 0.2);
padding: 40px 20px;
box-sizing: border-box;
}

img.profile-pic {
/* Increased size to 450px */
width: 450px;
height: 450px;
border-radius: 50%;
object-fit: cover;
border: 8px solid rgba(255, 255, 255, 0.3);
box-shadow: 0 0 50px rgba(255, 0, 100, 0.8);
animation: zoomIn 3s ease forwards;
opacity: 0;
/* Ensures text stays below the image */
display: block;
margin-bottom: 30px;
}

@keyframes zoomIn {
0% { transform: scale(0.5); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

h1 {
font-size: 2.5em;
color: white;
text-shadow: 0 0 20px #ff0066;
margin: 10px 0;
max-width: 800px;
animation: glow 2s infinite alternate;
}

@keyframes glow {
from { text-shadow: 0 0 10px #ff0066; }
to { text-shadow: 0 0 30px #ff66b2; }
}

#message {
font-size: 1.4em;
color: #fff;
max-width: 700px;
margin: 20px auto;
min-height: 3em;
text-shadow: 0 0 10px #ff66b2;
line-height: 1.5;
}

#signoff {
margin-top: 20px;
font-size: 1.5em;
color: #fff;
font-style: italic;
text-shadow: 0 0 15px #ff3399;
opacity: 0;
transition: opacity 2s;
}

.music-btn {
margin-top: 40px;
padding: 15px 35px;
font-size: 1.1em;
background-color: #ff0066;
color: white;
border: none;
border-radius: 30px;
cursor: pointer;
box-shadow: 0 4px 15px rgba(0,0,0,0.4);
z-index: 10;
transition: transform 0.2s;
}

.music-btn:active {
transform: scale(0.95);
}

.hearts {
position: fixed;
width: 100%;
height: 100%;
top: 0;
left: 0;
pointer-events: none;
z-index: 1;
}

.heart {
position: absolute;
width: 20px;
height: 20px;
background: red;
transform: rotate(45deg);
animation: float 6s infinite linear;
}

.heart::before, .heart::after {
content: '';
position: absolute;
width: 20px;
height: 20px;
background: red;
border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes float {
0% { transform: translateY(110vh) rotate(45deg); opacity: 1; }
100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}

@media (max-width: 600px) {
img.profile-pic {
width: 300px;
height: 300px;
}
h1 { font-size: 1.8em; }
}
</style>
</head>
<body>

<div class="container">
<img src="olajumoke.jpg" alt="Ya Aayni" class="profile-pic">
<h1>Happy Birthday Olajumoke, I wish you a prosperous long life in good health and wealth</h1>
<p id="message"></p>
<p id="signoff">With all my love, Abiodun</p>
<button class="music-btn" onclick="toggleMusic()">Play Music 🎶</button>
</div>

<div class="hearts"></div>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
const heart = document.createElement('div');
heart.className = 'heart';
heart.style.left = Math.random() * 100 + 'vw';
heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
document.querySelector('.hearts').appendChild(heart);
setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

const text = "You make my world brighter every day. Here’s to more laughter, adventures, and endless love together.. (MAESHA)";
let i = 0;
function typeWriter() {
if (i < text.length) {
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, 80);
} else {
document.getElementById("signoff").style.opacity = 1;
}
}

function toggleMusic() {
const music = document.getElementById('bgmusic');
const btn = document.querySelector('.music-btn');
if (music.paused) {
music.play();
btn.innerHTML = "Pause Music 🎵";
} else {
music.pause();
btn.innerHTML = "Play Music 🎶";
}
}

window.onload = () => {
setTimeout(typeWriter, 3000);
};
</script>
</body>
</html>
