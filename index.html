<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Ya Aayni🥰</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255, 0, 100, 0.7);
      animation: zoomIn 3s ease forwards;
      opacity: 0;
    }

    @keyframes zoomIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 2.5em;
      color: white;
      text-shadow: 0 0 20px #ff0066;
      margin-top: 20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff0066; }
      to { text-shadow: 0 0 30px #ff66b2; }
    }

    #message {
      font-size: 1.2em;
      color: #fff;
      max-width: 600px;
      margin-top: 15px;
      text-shadow: 0 0 10px #ff66b2;
    }

    #signoff {
      margin-top: 40px;
      font-size: 1.3em;
      color: #fff;
      font-style: italic;
      text-shadow: 0 0 15px #ff3399;
      animation: fadeInSignoff 5s ease forwards;
      opacity: 0;
    }

    @keyframes fadeInSignoff {
      to { opacity: 1; }
    }

    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s infinite;
    }

    .heart::before, .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    @keyframes float {
      0% { transform: translateY(0) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-600px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="olajumoke.jpg" alt="Ya Aayni">
    <h1>Happy Birthday Olajumoke, I wish you a prosperous long life in good health and wealth💖</h1>
    <p id="message"></p>
    <p id="signoff">— With all my love, Abiodun 💕</p>
  </div>
  <div class="hearts"></div>

  <!-- Background music -->
  <button onclick="document.getElementById('bgmusic').play()">Play Music 🎶</button>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>


  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      document.querySelector('.hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 500);

    // Typing effect
    const text = "You make my world brighter every day. Here’s to more laughter, adventures, and endless love together.. (MAESHA❤)";
    let i = 0;
    function typeWriter() {
      if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
      } else {
        // Show signoff after typing finishes
        document.getElementById("signoff").style.opacity = 1;
      }
    }
    window.onload = () => {
      setTimeout(typeWriter, 3000);
    };
  </script>
</body>
</html>
